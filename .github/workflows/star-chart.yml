name: Star Chart

# Refresh the self-hosted star-history SVGs weekly.
# Self-hosted because api.star-history.com lowercases repo owners and
# serves an empty chart for this repo (0xNyk -> 0xnyk).

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate charts
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/gen-star-history.py "$GITHUB_REPOSITORY" assets/star-history

      - name: Commit if changed
        run: |
          if git diff --quiet -- assets; then
            echo "No chart changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history-light.svg assets/star-history-dark.svg
          git commit -m "chore: refresh star-history charts"
          git push
